<!DOCTYPE html>
<html>
<head>
    <title>My Game</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; }
        canvas { display: block; }
        #score {
            position: absolute; top: 10px; left: 10px;
            color: white; font-family: Arial; font-size: 24px;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let circle = { x: 100, y: 100, r: 30 };

        // Move circle to random position
        function moveCircle() {
            circle.x = Math.random() * (canvas.width - 60) + 30;
            circle.y = Math.random() * (canvas.height - 60) + 30;
        }

        // Touch/Click handling
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const dist = Math.sqrt((x - circle.x) ** 2 + (y - circle.y) ** 2);
            
            if (dist < circle.r) {
                score++;
                document.getElementById('score').innerText = 'Score: ' + score;
                moveCircle();
                tg.hapticFeedback.impactOccurred('light');
            }
        });

        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();
            
            requestAnimationFrame(draw);
        }
        
        moveCircle();
        draw();
    </script>
</body>
</html>
